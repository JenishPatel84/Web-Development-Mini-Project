<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Card Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            padding: 10px;
            width: 250px;
            border: none;
            outline: none;
            border-radius: 5px;
        }

        .search-box button {
            padding: 10px 15px;
            border: none;
            background: #238636;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .card {
            background: white;
            width: 400px;
            padding: 20px;
            border-radius: 10px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        .card h2 {
            margin: 10px 0;
        }

        .card p {
            margin: 5px 0;
        }

        .info {
            text-align: left;
            margin-top: 15px;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>GitHub Profile Card Generator</h1>

        <div class="search-box">
            <input type="text" id="username" placeholder="Enter GitHub Username">
            <button id="btn">Generate Card</button>
        </div>

        <div id="cardContainer"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
