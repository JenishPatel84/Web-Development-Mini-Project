<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="weather_container">
            <div class="temp">
                <p>20 &deg;</p>
            </div>
            <div class="time_location">
                <p>Patan</p>
                <span> 2026-07-03 - Sunday 12:56 </span>
            </div>
            <div class="condition">
                <img src="weather-svgrepo-com.svg" alt="" height="50px">
                <p>Dry</p>
            </div>
        </div>
        <nav>
            <form action="">
                <input type="text" name="" class="search_area" placeholder="Search for location">
                <button type="submit" class="search_button">search</button>
            </form>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
